services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    command: --default-authentication-plugin=mysql_native_password 
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: NULL
      MYSQL_DATABASE: NULL
      MYSQL_ROOT_HOST: '%'           # 👈 เพิ่มบรรทัดนี้ (สำคัญมาก!)
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: web_app
    ports:
      - "8080:80"
    depends_on:
      - db
