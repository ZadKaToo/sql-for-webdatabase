services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    # สำหรับ MySQL 8.0 ใช้คำสั่งนี้ถูกแล้วครับ
    command: --default-authentication-plugin=mysql_native_password 
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: my_web_db
      MYSQL_ROOT_HOST: '%'           # 👈 เพิ่มบรรทัดนี้ (สำคัญมาก!)
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: web_app
    ports:
      - "8080:80"
    depends_on:
      - db